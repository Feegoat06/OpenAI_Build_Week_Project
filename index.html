<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description"
    content="LEGATO is an interactive AI music tutor for composing, hearing, and understanding chord transitions.">
  <title>LEGATO — Progression Coach</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <!--
    Shell only. Each panel injects its own HTML into a mount point:
      - #editor-pane-mount     → js/ui/editor-panel.js
      - #sheet-music-pane-mount → js/ui/sheet-music-panel.js
                                   (which itself mounts transport + coach)
      - #piano-modal-mount     → js/ui/piano-modal.js
    Split for parallel dev: left- and right-panel work touches its own
    module, not this file.
  -->
  <div class="app-shell">
    <aside id="editor-pane-mount"></aside>
    <main id="sheet-music-pane-mount"></main>
  </div>
  <div id="piano-modal-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.5/build/cjs/vexflow.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>

</html>
